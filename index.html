<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fries Catcher</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rotate-nudge">
    <div>
      <div class="icon">📱</div>
      <div>Rotate device to</div>
      <div style="color:#ffb547; font-size:32px; margin-top:8px">LANDSCAPE</div>
    </div>
  </div>
  <div id="stage">
    <div id="game" data-screen-label="01 Game">
      <div id="bg-veil"></div>
      <canvas id="play"></canvas>

      <!-- HUD -->
      <div class="hud">
        <div class="hud-card score" id="scoreCard">
          <div class="score-icon" id="scoreIcon"></div>
          <div>
            <div class="label">FRIES</div>
            <div class="value" id="scoreVal">0</div>
          </div>
        </div>
        <div class="hud-right">
          <div class="hud-card timer" id="timerCard">
            <div>
              <div class="label" style="text-align:right">TIME</div>
              <div class="value" id="timerVal">50</div>
            </div>
          </div>
          <button class="stop-btn" id="stopBtn" aria-label="Pause" title="Pause">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><rect x="6" y="5" width="4" height="14" fill="currentColor" stroke="none" rx="1"/><rect x="14" y="5" width="4" height="14" fill="currentColor" stroke="none" rx="1"/></svg>
          </button>
          <button class="stop-btn debug-csv-btn hidden" id="debugCsvBtn" title="Download CSV">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 12-4-4m4 4 4-4"/><rect x="3" y="17" width="18" height="4" rx="1" fill="currentColor" stroke="none" opacity="0.5"/></svg>
          </button>
        </div>
      </div>

      <!-- Pause overlay -->
      <div class="overlay hidden" id="pauseScreen">
        <div class="panel">
          <div class="title">PAUSED</div>
          <div class="subtitle">Take a breath — the fries will wait.</div>
          <div style="display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top:8px">
            <button class="btn" id="resumeBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Cross.svg">RESUME</button>
            <button class="btn btn-alt" id="restartBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Triangle.svg">RESTART</button>
            <button class="btn btn-alt" id="homeBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Circle.svg">HOME</button>
          </div>
        </div>
      </div>

      <div class="combo-badge" id="comboBadge">COMBO ×2</div>

      <!-- <div class="drag-hint" id="dragHint">🎮 tilt or use stick to move</div> -->


      <div class="flash-good" id="flashGood"></div>
      <div class="flash-bad" id="flashBad"></div>
      <div id="countdown"></div>

      <!-- Pre-game controller hint -->
      <div id="startHint" class="hidden">
        <img src="assets/Dualsense_Black_1.png" alt="">
      </div>

      <!-- Start overlay -->
      <div class="overlay" id="startScreen">
        <div class="panel">
          <div class="title">FRIES<br>CATCHER</div>
          <div class="subtitle">Catch the fries. Dodge the chillis.</div>
          <div class="rules">
            <div class="rule">
              <div class="swatch sw-fry"></div>
              <div>Fries → <strong>+1</strong> fry</div>
            </div>
            <div class="rule bad">
              <div class="swatch sw-chilli"></div>
              <div>Chilli → <strong>−3</strong> fries</div>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
            <button class="btn-ds" id="connectBtn">🎮 Connect DualSense</button>
            <button class="btn-ds" id="speakerBtn" style="display:none">🔊 Select Controller Speaker</button>
            <button class="btn" id="startBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Cross.svg">START</button>
          </div>
 
        </div>
      </div>

      <!-- Game over overlay -->
      <div class="overlay hidden" id="endScreen">
        <div class="panel">
          <div class="title">TIME'S UP!</div>
          <div class="big-score" id="finalScore">0</div>
          <div class="score-label">Fries Caught</div>
          <div class="stats">
            <div class="stat">
              <div class="n" id="bestStreak">0</div>
              <div class="l">Best Streak</div>
            </div>
            <div class="stat">
              <div class="n" id="chillisHit">0</div>
              <div class="l">Chillis Hit</div>
            </div>
          </div>
          <div style="display:flex; justify-content:center; margin-top:4px">
            <button class="btn" id="continueBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Cross.svg">CONTINUE</button>
          </div>
        </div>
      </div>

      <!-- Leaderboard overlay -->
      <div class="overlay hidden" id="leaderboardScreen">
        <div class="panel lb-panel">
          <div class="title">LEADERBOARD</div>
          <div class="lb-list-wrap" id="lbListWrap">
            <ol id="lbList" class="lb-list"></ol>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px; margin-top:12px">
            <button class="btn lb-action-btn" id="lbAgainBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Cross.svg">PLAY AGAIN</button>
            <button class="btn btn-alt lb-action-btn" id="lbHomeBtn"><img class="ps5-btn-icon" src="assets/PS5_buttons/Circle.svg">HOME</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="config.js"></script>
<script src="dualsense.js"></script>
<script src="game.js"></script>
</body>
</html>
